# SubTracker — Home Assistant add-on (prebuilt image).
#
# The Supervisor PULLS the image below (it does not build on-device); `{arch}` is
# substituted per host and `:<version>` is appended automatically. Images are
# published to GHCR by .github/workflows/build.yaml — keep `version` in sync with
# the tag that workflow pushes (it reads this same file, so just bump it here).
name: SubTracker
version: "0.2.0"
slug: subtracker
description: Multi-tenant subscription tracker (FastHTML + SQLite)
url: https://github.com/78wesley/subtracker
image: "ghcr.io/78wesley/subtracker-{arch}"
arch:
  - amd64
  - aarch64
init: false
startup: application
# Let the Supervisor restart the add-on if the web server stops responding.
watchdog: "http://[HOST]:[PORT:5001]/login"
# Expose the web UI on the host. Change the host port (left) to avoid clashes.
ports:
  5001/tcp: 5001
ports_description:
  5001/tcp: SubTracker web interface
# Shows an "Open Web UI" button on the add-on page.
webui: "http://[HOST]:[PORT:5001]"
# User options — the Supervisor writes them to /data/options.json, which the
# image's entrypoint reads. The session secret is intentionally NOT an option:
# the entrypoint auto-generates and persists one under /data/.secret.
options:
  log_level: info
schema:
  log_level: "list(trace|debug|info|notice|warning|error|critical)?"
