# Run the pytest suite. Triggered directly on pull requests, and reused
# (via `workflow_call`) as a gating job by the nightly + release pipelines so a
# failing test suite never publishes an image.
name: Tests

on:
  workflow_call:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies (runtime + dev)
        run: uv sync --frozen --group dev

      - name: Lint (ruff)
        run: uv run ruff check app tests

      - name: Type-check (mypy)
        run: uv run mypy

      - name: Run tests (with coverage)
        run: uv run pytest --cov --cov-report=term-missing
